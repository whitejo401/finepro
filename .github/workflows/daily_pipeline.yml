name: Daily Financial Data Pipeline

on:
  schedule:
    # 매일 UTC 21:00 (KST 06:00) — 미국 장 마감 후 한국 개장 3시간 전
    - cron: "0 21 * * 1-5"   # 평일만 실행
  workflow_dispatch:
    inputs:
      mode:
        description: "Report mode (daily/weekly/monthly/all 또는 d1~m6)"
        required: false
        default: "daily"
      start:
        description: "시작일 YYYY-MM-DD (기본: 1년 전)"
        required: false
        default: ""

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set start date
        id: dates
        run: |
          START="${{ github.event.inputs.start }}"
          if [ -z "$START" ]; then
            START=$(date -d "1 year ago" +%Y-%m-%d 2>/dev/null || date -v-1y +%Y-%m-%d)
          fi
          echo "start=$START" >> $GITHUB_OUTPUT

      - name: Run pipeline
        env:
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY:           ${{ secrets.EIA_API_KEY }}
          COINGECKO_API_KEY:     ${{ secrets.COINGECKO_API_KEY }}
          NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}
          DART_API_KEY:          ${{ secrets.DART_API_KEY }}
          ECOS_API_KEY:          ${{ secrets.ECOS_API_KEY }}
          DATA_GO_KR_API_KEY:    ${{ secrets.DATA_GO_KR_API_KEY }}
          MOLIT_API_KEY:         ${{ secrets.MOLIT_API_KEY }}
          REDDIT_CLIENT_ID:      ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:  ${{ secrets.REDDIT_CLIENT_SECRET }}
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          KRX_ID:                ${{ secrets.KRX_ID }}
          KRX_PW:                ${{ secrets.KRX_PW }}
        run: |
          python main.py \
            --mode "${{ github.event.inputs.mode || 'daily' }}" \
            --start "${{ steps.dates.outputs.start }}"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Upload prediction log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prediction-log-${{ github.run_id }}
          path: data/processed/prediction_log.parquet
          retention-days: 90
          if-no-files-found: ignore
